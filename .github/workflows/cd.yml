name: CD

on:
  push:
    branches: [main]

jobs:
  build-push:
    name: Build & Push images Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Connexion Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push backend
        uses: docker/build-push-action@v5
        with:
          context: ./LogiscoolEventWebSite
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/logiscool-backend:latest,${{ secrets.DOCKER_USERNAME }}/logiscool-backend:${{ github.sha }}

      - name: Build & Push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./logiscool-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/logiscool-frontend:latest,${{ secrets.DOCKER_USERNAME }}/logiscool-frontend:${{ github.sha }}

  deploy-staging:
    name: Déploiement Staging
    runs-on: ubuntu-latest
    needs: build-push
    environment: staging
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/logiscool
            docker compose pull
            docker compose up -d
            docker image prune -f

  deploy-prod:
    name: Déploiement Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/logiscool
            docker compose pull
            docker compose up -d
            docker image prune -f
