<nav class="navbar">
  <a routerLink="/" class="navbar-brand">Logiscool Events</a>

  <div class="navbar-links">
    <a routerLink="/" class="nav-link">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Événements
    </a>
    @if (authService.isLoggedIn()) {
      <a routerLink="/reservations" class="nav-link">Mes réservations</a>
    }
    @if (isAdmin()) {
      <a routerLink="/admin" class="nav-link">Administration</a>
    }
  </div>

  <div class="navbar-actions">
    @if (authService.isLoggedIn()) {
      <span class="navbar-user">{{ authService.getUsername() }}</span>
      <button class="btn btn-outline btn-sm" (click)="logout()">Déconnexion</button>
    } @else {
      <button class="btn btn-primary btn-sm" (click)="login()">Se connecter</button>
    }
  </div>
</nav>
