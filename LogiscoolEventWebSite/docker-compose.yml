version: "3.9"

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: aytec
      POSTGRES_USER: postgre
      POSTGRES_DB: event
    ports:
      - "5433:5432"

  my-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    environment:
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    command: start-dev